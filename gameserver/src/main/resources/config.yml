# Contact Discord[@sieadev] GitHub[@sieadev] Email[Contact@siea.dev]

# ==============================
# Language Settings
# ==============================
# Available options: EN, DE, FR, IT, PL, RO, RS, TR, UA, ES, HI, RU, NL, TH
language: en


# ==============================
# Database Configuration
# ==============================
# Supported types: sqlite (default), mysql, mariadb, postgresql
database:
  type: sqlite
  url: ""         # Database connection URL (not required for sqlite)
  username: ""
  password: ""


# ==============================
# Discord Bot Configuration
# ==============================
discord:
  token: ""           # Your Discord bot token
  guild: ""           # Your server (guild) ID
  channel: ""         # Channel ID for the verification embed

  # Optional: Role assigned after successful verification
  verifiedRoleId: ""


# ==============================
# Pre-Verification Rules
# ==============================

# Commands users are allowed to use before verifying
allowedCommands: ["/link"]

# Actions allowed before verifying
# Possible values: BREAK, PLACE, CHAT, MOVE, DROP, INVENTORY
allowedActions: ["CHAT"]

# Force users to link their account before playing
forceLink: false

# If enabled, users only need to verify when logging in from a new location
rememberSignInLocation: true