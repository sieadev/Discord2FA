# Contact Discord[@sieadev] GitHub[@sieadev] Email[Contact@siea.dev]

# ----------------------------- Lang -----------------------------
# Choose from EN,DE,FR,IT,PL,RO,RS,TR and UA
language: en

# --------------------------- Database ---------------------------
# type: sqlite (default), mysql, mariadb, or postgresql
# For MySQL/MariaDB/PostgreSQL, add the matching JDBC driver JAR to your proxy classpath (BungeeCord/Velocity).
database:
  type: sqlite
  url: ""
  username: ""
  password: ""

# -------------------------- DiscordBot --------------------------
discord:
  token: ""
  guild: ""
  channel: ""

# --------------------------- Settings ---------------------------
allowedCommands: ["/link"] # Commands allowed before the Player is verified

# Actions allowed before verifying
# Values: 'BREAK' 'PLACE' 'CHAT' 'MOVE' 'DROP' 'INVENTORY'
allowedActions: ["CHAT"]

forceLink: false # Force Users to Link their accounts

rememberSignInLocation: true # Remember IP addresses; only request verification on new ones

# ----------------------------- Proxy ----------------------------
server:
  verification: ""
  post-verification: ""