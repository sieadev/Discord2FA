name: Discord2FA
version: ${project.version}
main: dev.siea.discord2fa.paper.Discord2FAPaper
api-version: '1.20'
authors: ['sieadev']
# Optional JDBC drivers: downloaded by Paper and added to classpath when using MySQL/MariaDB/PostgreSQL
libraries:
  - com.mysql:mysql-connector-j:8.3.0
  - org.mariadb:mariadb-java-client:3.5.7
  - com.google.protobuf:protobuf-java:3.25.1
  - org.postgresql:postgresql:42.7.2
  - org.checkerframework:checker-qual:3.42.0

permissions:
  discord2fa.admin:
    description: Use /discord2fa version and status
    default: op
  discord2fa.link:
    description: Use /link to link your Minecraft account to Discord (revoke to deny)
    default: true
  discord2fa.unlink:
    description: Use /unlink to unlink your Discord account (revoke to deny)
    default: true

commands:
  discord2fa:
    description: Discord2FA admin (version, status)
    usage: /<command> [version|status]
    permission: discord2fa.admin
    aliases: [d2fa]
  link:
    description: Link your Minecraft account to Discord with a code from the Discord server
    permission: discord2fa.link
  unlink:
    description: Unlink your Minecraft account from Discord (must be verified first)
    permission: discord2fa.unlink

